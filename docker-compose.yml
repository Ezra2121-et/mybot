version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: projectbot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: mysecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d projectbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      DATABASE_URL: postgresql://botuser:mysecretpassword@postgres:5432/projectbot
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data: